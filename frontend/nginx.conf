server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # index.html nunca deve ser cacheado — garante que o browser sempre busca a versão mais recente
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Assets com hash gerados pelo Vite podem ser cacheados permanentemente
    location ~* \.(js|css|woff2?|ico|png|jpg|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — redireciona todas as rotas para o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
